<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DeepCode</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body data-view="chat">
    <div class="app-shell">
      <header class="app-bar">
        <div class="app-bar-left">
          <button class="icon-button" type="button" title="后退" disabled>‹</button>
          <button class="icon-button" type="button" title="前进" disabled>›</button>
          <nav class="menu-strip" aria-label="应用菜单">
            <button type="button">文件</button>
            <button type="button">编辑</button>
            <button type="button">查看</button>
            <button type="button">窗口</button>
            <button type="button">帮助</button>
          </nav>
        </div>
        <div class="app-bar-right">
          <button class="toolbar-button" type="button" title="运行">▷</button>
          <button class="toolbar-button model-toolbar" type="button" title="模型"><span id="toolbar-model">模型</span>⌄</button>
          <button class="icon-button" type="button" title="终端">⌁</button>
          <button class="icon-button" type="button" title="面板">▯</button>
          <div class="status-pill" id="status-pill" data-mode="ready"><span class="status-dot"></span><span id="status-text">Ready</span></div>
          <div class="window-controls" aria-label="窗口控制">
            <button id="window-minimize" class="window-control" type="button" title="最小化">─</button>
            <button id="window-maximize" class="window-control" type="button" title="最大化">□</button>
            <button id="window-close" class="window-control close" type="button" title="关闭">×</button>
          </div>
        </div>
      </header>

      <div class="workbench">
        <aside class="sidebar">
          <div class="sidebar-content">
            <div class="brand"><span class="brand-mark">D</span><span>DeepCode</span></div>
            <nav class="primary-nav" aria-label="主导航">
              <button id="new-chat" class="nav-button" type="button"><span class="nav-icon">＋</span><span>新对话</span></button>
              <button class="nav-button" type="button"><span class="nav-icon">⌕</span><span>搜索</span></button>
              <button class="nav-button" type="button"><span class="nav-icon">⌘</span><span>插件</span></button>
              <button class="nav-button" type="button"><span class="nav-icon">◴</span><span>自动化</span></button>
            </nav>

            <div class="nav-section">
              <div class="section-label">项目</div>
              <button class="project-item active" type="button">
                <span class="project-icon">▱</span>
                <span class="item-main">deepcode</span>
                <span class="item-action">↗</span>
              </button>
              <button class="project-item" type="button">
                <span class="project-icon">▱</span>
                <span class="item-main">onedrive-vercel-index</span>
                <span class="item-action">↗</span>
              </button>
              <button class="project-item" type="button">
                <span class="project-icon">▱</span>
                <span class="item-main">MoverTool</span>
                <span class="item-action">↗</span>
              </button>
              <button class="project-item" type="button">
                <span class="project-icon">▱</span>
                <span class="item-main">pusheen</span>
                <span class="item-action">↗</span>
              </button>
            </div>

            <div class="nav-section conversations">
              <div class="section-label row-label"><span>对话</span><button id="refresh-threads" class="mini-action" type="button" title="刷新对话">↻</button></div>
              <div id="thread-list" class="thread-list">
                <button class="session-item empty" type="button" data-view="chat">
                  <span>暂无聊天</span>
                </button>
              </div>
            </div>
          </div>

          <div class="sidebar-footer">
            <button id="open-settings" class="settings-link" type="button" data-view="settings"><span class="nav-icon">⚙</span><span>设置</span></button>
            <div class="version-info" id="version-info"></div>
          </div>
        </aside>

        <main class="main-pane">
          <header class="conversation-header">
            <div>
              <h1 id="view-title">修复对话报错</h1>
              <div class="meta-line"><span id="workspace-meta">工作区加载中</span> · <span id="model-meta">模型加载中</span></div>
            </div>
            <button class="conversation-more" type="button" title="更多">···</button>
          </header>

          <section id="chat-view" class="view active">
            <div id="messages" class="messages"></div>
            <div class="composer">
              <div class="composer-card">
                <textarea id="prompt-input" placeholder="输入需求，描述你想让 DeepCode 处理的事情"></textarea>
                <div class="composer-actions">
                  <div class="composer-tools">
                    <button class="icon-button composer-tool" type="button" title="添加">＋</button>
                    <button class="tool-chip" type="button" title="自动审查">自动审查⌄</button>
                    <button class="tool-chip" type="button" title="模型"><span id="composer-model">模型</span>⌄</button>
                  </div>
                  <div class="composer-tools">
                    <button class="icon-button composer-tool" type="button" title="语音">◌</button>
                    <button id="interrupt-button" class="icon-button composer-tool danger-tool" type="button" title="取消运行" hidden>□</button>
                    <button id="send-button" class="send-button" type="button" title="发送">↑</button>
                  </div>
                </div>
              </div>
            </div>
          </section>

          <section id="settings-view" class="view">
            <div class="settings-card">
              <h2>基础设置</h2>
              <p class="helper-text">V1 默认使用 mock 联调；切到 stdio 后会由主进程启动 `codex app-server` 并通过 JSON-RPC 通信。</p>
              <div class="form-grid">
                <label>Transport
                  <select id="transport">
                    <option value="mock">mock</option>
                    <option value="stdio">stdio</option>
                    <option value="websocket">websocket</option>
                  </select>
                </label>
                <label>Codex 命令
                  <input id="app-server-command" type="text" placeholder="codex" />
                </label>
                <label>Codex 参数
                  <input id="app-server-args" type="text" placeholder="app-server" />
                </label>
                <label>WebSocket URL
                  <input id="app-server-url" type="text" placeholder="ws://127.0.0.1:4500" />
                </label>
                <label>模型名称
                  <input id="model" type="text" placeholder="gpt-5.4" />
                </label>
                <label>工作区路径
                  <input id="workspace-path" type="text" />
                </label>
                <label>OpenAI API Key
                  <input id="api-key" type="password" placeholder="可选：为空时使用本机 Codex 登录或环境变量" />
                </label>
                <label>审批策略
                  <select id="approval-policy">
                    <option value="on-request">on-request</option>
                    <option value="on-failure">on-failure</option>
                    <option value="untrusted">untrusted</option>
                    <option value="never">never</option>
                  </select>
                </label>
                <label>Sandbox
                  <select id="sandbox-policy">
                    <option value="workspace-write">workspace-write</option>
                    <option value="read-only">read-only</option>
                    <option value="danger-full-access">danger-full-access</option>
                  </select>
                </label>
                <label>网络访问
                  <select id="network-access">
                    <option value="restricted">restricted</option>
                    <option value="enabled">enabled</option>
                  </select>
                </label>
                <label>可写根目录
                  <input id="writable-roots" type="text" placeholder="留空时使用工作区；多个路径用逗号分隔" />
                </label>
              </div>
              <div class="form-actions">
                <button id="save-settings" class="send-button text-send" type="button">保存设置</button>
                <button id="test-connection" class="secondary-button" type="button">连接测试</button>
              </div>
              <div id="settings-notice" class="notice"></div>
            </div>
          </section>
        </main>

        <aside class="branch-panel" aria-label="分支详情">
          <div class="branch-card">
            <div class="branch-heading">
              <h2>分支详情</h2>
              <button class="icon-button" type="button" title="更多">···</button>
            </div>
            <div class="branch-row changes-row">
              <span class="branch-label">更改</span>
              <span class="change-counts"><span class="insertions">+3,007</span> <span class="deletions">-46</span></span>
            </div>
            <div class="branch-row">
              <span class="branch-label">Git 操作</span>
              <span class="branch-value">本地更改</span>
            </div>
            <div class="branch-row muted-row">
              <span class="branch-label">GitHub CLI</span>
              <span class="branch-value">不可用</span>
            </div>
            <div class="branch-actions">
              <button id="save-plan" class="secondary-button" type="button" disabled>保存计划</button>
              <button class="secondary-button ghost" type="button" disabled>发布 PR</button>
            </div>
            <details class="branch-subsection branch-details">
              <summary><span>运行事件</span><span id="run-summary">等待运行</span></summary>
              <div id="run-log" class="run-log">等待运行。</div>
            </details>
            <details class="branch-subsection branch-details">
              <summary><span>最近计划</span><span id="plan-summary">暂无计划</span></summary>
              <div id="plan-box" class="plan-box">暂无计划。发送需求后，Agent 回复会显示在这里。</div>
              <div id="plan-notice" class="notice"></div>
            </details>
          </div>
        </aside>
      </div>
    </div>

    <div id="approval-overlay" class="approval-overlay" hidden>
      <section class="approval-dialog" role="dialog" aria-modal="true" aria-labelledby="approval-title">
        <div class="approval-header">
          <div>
            <div id="approval-kicker" class="approval-kicker">审批</div>
            <h2 id="approval-title">需要确认</h2>
          </div>
          <button id="approval-close" class="icon-button" type="button" title="取消">×</button>
        </div>
        <div id="approval-warning" class="approval-warning" hidden></div>
        <div id="approval-body" class="approval-body"></div>
        <div id="approval-actions" class="approval-actions"></div>
      </section>
    </div>

    <script>
      const state = {
        settings: {},
        conversationId: null,
        turnId: null,
        threads: [],
        threadListLoaded: false,
        currentRequest: '',
        latestPlan: '',
        sending: false,
        interrupting: false,
        activeRequestId: '',
        streamContent: '',
        activeAgentMessage: null,
        activeSummaryEvent: null,
        turnStartedAt: 0,
        summaryCompleted: false,
        eventStats: {
          commands: 0,
        },
        emptyStateMessage: null,
        runLogCount: 0,
        pendingApprovals: new Map(),
        activeApprovalId: null,
      };
      const $ = (id) => document.getElementById(id);
      function createRequestId() {
        return `request-${Date.now()}-${Math.random().toString(16).slice(2)}`;
      }
      function setStatus(text, mode = 'ready') {
        $('status-text').textContent = text;
        $('status-pill').dataset.mode = mode;
      }
      function scrollMessages() {
        $('messages').scrollTop = $('messages').scrollHeight;
      }
      function addMessage(role, content) {
        const message = document.createElement('div');
        message.className = `message ${role}`;
        message.textContent = content;
        $('messages').appendChild(message);
        scrollMessages();
        return message;
      }
      function showEmptyState() {
        if (state.emptyStateMessage) return;
        const message = document.createElement('div');
        message.className = 'empty-state-message';
        message.textContent = '你好，我是 DeepCode Code Agent。请描述你想实现的功能或修改。';
        $('messages').appendChild(message);
        state.emptyStateMessage = message;
      }
      function clearEmptyState() {
        if (!state.emptyStateMessage) return;
        state.emptyStateMessage.remove();
        state.emptyStateMessage = null;
      }
      function addEventLine(label, mode = 'event') {
        const entry = document.createElement('div');
        entry.className = `timeline-event ${mode}`;
        entry.textContent = label;
        $('messages').appendChild(entry);
        scrollMessages();
        return entry;
      }
      function updateEventLine(entry, label) {
        if (!entry) return;
        entry.textContent = label;
      }
      function formatElapsed(startedAt) {
        const elapsed = Math.max(0, Date.now() - startedAt);
        if (elapsed < 1000) {
          return '1s';
        }
        const seconds = Math.round(elapsed / 1000);
        if (seconds < 60) {
          return `${seconds}s`;
        }
        const minutes = Math.floor(seconds / 60);
        const rest = seconds % 60;
        return rest ? `${minutes}m ${rest}s` : `${minutes}m`;
      }
      function resetTurnSummary() {
        state.activeSummaryEvent = null;
        state.turnStartedAt = 0;
        state.summaryCompleted = false;
        state.eventStats = {
          commands: 0,
        };
      }
      function updateEventStats(label) {
        if (/commandExecution started/i.test(label)) {
          state.eventStats.commands += 1;
        }
      }
      function completeTurnSummary() {
        if (state.summaryCompleted || !state.activeSummaryEvent || !state.turnStartedAt) {
          return;
        }
        state.summaryCompleted = true;
        updateEventLine(state.activeSummaryEvent, `已处理 ${formatElapsed(state.turnStartedAt)}`);
        if (state.eventStats.commands > 0) {
          addEventLine(`已运行 ${state.eventStats.commands} 条命令`);
        }
      }
      function appendRunLog(label) {
        const runLog = $('run-log');
        if (runLog.textContent === '等待运行。') {
          runLog.textContent = '';
        }
        const entry = document.createElement('div');
        entry.textContent = label;
        runLog.appendChild(entry);
        runLog.scrollTop = runLog.scrollHeight;
        state.runLogCount += 1;
        $('run-summary').textContent = `${state.runLogCount} 条事件`;
        updateEventStats(label);
      }
      function resetRunLog() {
        state.runLogCount = 0;
        $('run-log').textContent = '等待运行。';
        $('run-summary').textContent = '等待运行';
      }
      function updateMeta() {
        const transport = state.settings.transport || 'mock';
        const model = state.settings.model || '未设置模型';
        $('workspace-meta').textContent = state.settings.workspacePath || '未设置工作区';
        $('model-meta').textContent = `${transport} · ${model}`;
        $('toolbar-model').textContent = model;
        $('composer-model').textContent = model;
      }
      function formatThreadTitle(thread) {
        if (!thread) return '未命名对话';
        return thread.name || thread.preview || `对话 ${String(thread.id || '').slice(0, 8)}`;
      }
      function formatThreadTime(timestamp) {
        if (!timestamp) return '';
        const date = new Date(timestamp * 1000);
        const diff = Date.now() - date.getTime();
        if (diff < 60 * 1000) return '刚刚';
        if (diff < 60 * 60 * 1000) return `${Math.max(1, Math.round(diff / 60000))} 分`;
        if (diff < 24 * 60 * 60 * 1000) return `${Math.round(diff / 3600000)} 小时`;
        return date.toLocaleDateString('zh-CN', { month: 'numeric', day: 'numeric' });
      }
      function renderThreadList() {
        const list = $('thread-list');
        list.innerHTML = '';
        if (!state.threads.length) {
          const empty = document.createElement('button');
          empty.className = 'session-item empty';
          empty.type = 'button';
          empty.innerHTML = '<span>暂无聊天</span>';
          empty.addEventListener('click', () => switchView('chat'));
          list.appendChild(empty);
          return;
        }

        state.threads.forEach((thread) => {
          const item = document.createElement('button');
          item.className = `session-item${thread.id === state.conversationId ? ' active' : ''}`;
          item.type = 'button';
          item.dataset.threadId = thread.id;
          const title = document.createElement('span');
          title.textContent = formatThreadTitle(thread);
          const time = document.createElement('span');
          time.className = 'item-time';
          time.textContent = formatThreadTime(thread.updatedAt);
          item.append(title, time);
          item.addEventListener('click', () => resumeThread(thread.id));
          list.appendChild(item);
        });
      }
      async function loadThreads() {
        if ((state.settings.transport || 'mock') === 'mock') {
          state.threads = state.conversationId
            ? [{ id: state.conversationId, preview: 'Mock 对话', updatedAt: Math.floor(Date.now() / 1000) }]
            : [];
          renderThreadList();
          return;
        }

        try {
          const result = await window.deepcode.listThreads({ limit: 30 });
          state.threads = result.threads || [];
          state.threadListLoaded = true;
          renderThreadList();
        } catch (error) {
          state.threads = [];
          renderThreadList();
          appendRunLog(`对话列表加载失败：${error.message}`);
        }
      }
      function updateTransportFields() {
        const transport = $('transport').value;
        const isWebSocket = transport === 'websocket';
        const isMock = transport === 'mock';
        $('app-server-url').disabled = !isWebSocket;
        $('app-server-command').disabled = isMock || isWebSocket;
        $('app-server-args').disabled = isMock || isWebSocket;
      }
      function fillSettingsForm() {
        $('transport').value = state.settings.transport || 'mock';
        $('app-server-command').value = state.settings.appServerCommand || 'codex';
        $('app-server-args').value = state.settings.appServerArgs || 'app-server';
        $('api-key').value = state.settings.apiKey || '';
        $('app-server-url').value = state.settings.appServerUrl || '';
        $('model').value = state.settings.model || '';
        $('workspace-path').value = state.settings.workspacePath || '';
        $('approval-policy').value = state.settings.approvalPolicy || 'on-request';
        $('sandbox-policy').value = state.settings.sandboxPolicy || 'workspace-write';
        $('network-access').value = state.settings.networkAccess || 'restricted';
        $('writable-roots').value = state.settings.writableRoots || '';
        updateTransportFields();
      }
      function collectSettingsForm() {
        return {
          transport: $('transport').value,
          appServerCommand: $('app-server-command').value.trim(),
          appServerArgs: $('app-server-args').value.trim(),
          apiKey: $('api-key').value.trim(),
          appServerUrl: $('app-server-url').value.trim(),
          model: $('model').value.trim(),
          workspacePath: $('workspace-path').value.trim(),
          approvalPolicy: $('approval-policy').value,
          sandboxPolicy: $('sandbox-policy').value,
          networkAccess: $('network-access').value,
          writableRoots: $('writable-roots').value.trim(),
        };
      }
      function switchView(view) {
        document.body.dataset.view = view;
        $('chat-view').classList.toggle('active', view === 'chat');
        $('settings-view').classList.toggle('active', view === 'settings');
        renderThreadList();
        $('open-settings').classList.toggle('active', view === 'settings');
        $('view-title').textContent = view === 'settings' ? '设置' : (state.conversationId ? 'Agent 对话' : '新对话');
      }
      async function loadSettings() {
        state.settings = await window.deepcode.getSettings();
        fillSettingsForm();
        updateMeta();
        await loadThreads();
      }
      function decisionLabel(decision) {
        const labels = {
          accept: '允许',
          acceptForSession: '本会话允许',
          decline: '拒绝',
          cancel: '取消',
          submit: '提交',
        };
        return labels[decision] || decision;
      }
      function appendApprovalDetail(parent, label, value, asCode = false) {
        if (!value) return;
        const row = document.createElement('div');
        row.className = 'approval-detail';
        const key = document.createElement('span');
        key.textContent = label;
        const content = asCode ? document.createElement('pre') : document.createElement('strong');
        content.textContent = value;
        row.append(key, content);
        parent.appendChild(row);
      }
      function renderToolQuestion(parent, question) {
        const block = document.createElement('div');
        block.className = 'approval-question';
        block.dataset.questionId = question.id;
        block.dataset.hasOptions = Array.isArray(question.options) && question.options.length ? 'true' : 'false';
        block.dataset.isSecret = question.isSecret ? 'true' : 'false';

        const label = document.createElement('label');
        label.textContent = question.question || question.header || question.id;
        block.appendChild(label);

        if (Array.isArray(question.options) && question.options.length) {
          const options = document.createElement('div');
          options.className = 'approval-options';
          question.options.forEach((option, index) => {
            const optionLabel = document.createElement('label');
            optionLabel.className = 'approval-option';
            const radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = `approval-${question.id}`;
            radio.value = option.label;
            radio.checked = index === 0;
            const text = document.createElement('span');
            text.textContent = option.description ? `${option.label} · ${option.description}` : option.label;
            optionLabel.append(radio, text);
            options.appendChild(optionLabel);
          });
          if (question.isOther) {
            const otherLabel = document.createElement('label');
            otherLabel.className = 'approval-option';
            const radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = `approval-${question.id}`;
            radio.value = '__other__';
            const text = document.createElement('span');
            text.textContent = '其他';
            otherLabel.append(radio, text);
            const input = document.createElement('input');
            input.className = 'approval-other-input';
            input.type = question.isSecret ? 'password' : 'text';
            input.placeholder = '输入内容';
            options.append(otherLabel, input);
          }
          block.appendChild(options);
        } else {
          const input = document.createElement('input');
          input.className = 'approval-text-input';
          input.type = question.isSecret ? 'password' : 'text';
          input.placeholder = question.header || '输入内容';
          block.appendChild(input);
        }

        parent.appendChild(block);
      }
      function collectToolAnswers() {
        const answers = {};
        $('approval-body').querySelectorAll('.approval-question').forEach((block) => {
          const id = block.dataset.questionId;
          let value = '';
          if (block.dataset.hasOptions === 'true') {
            const selected = block.querySelector('input[type="radio"]:checked');
            if (selected?.value === '__other__') {
              value = block.querySelector('.approval-other-input')?.value.trim() || '';
            } else {
              value = selected?.value || '';
            }
          } else {
            value = block.querySelector('.approval-text-input')?.value.trim() || '';
          }
          answers[id] = { answers: value ? [value] : [] };
        });
        return answers;
      }
      function renderApprovalDialog(approval) {
        state.activeApprovalId = approval.id;
        $('approval-kicker').textContent = approval.method || 'approval';
        $('approval-title').textContent = approval.title || '需要确认';
        $('approval-body').innerHTML = '';
        $('approval-actions').innerHTML = '';

        if (approval.destructive) {
          $('approval-warning').hidden = false;
          $('approval-warning').textContent = '检测到破坏性命令，继续前请确认目标路径和影响范围。';
        } else {
          $('approval-warning').hidden = true;
          $('approval-warning').textContent = '';
        }

        if (approval.kind === 'command') {
          appendApprovalDetail($('approval-body'), '命令', approval.command || '(空命令)', true);
          appendApprovalDetail($('approval-body'), '目录', approval.cwd || '');
          appendApprovalDetail($('approval-body'), '原因', approval.reason || '');
        } else if (approval.kind === 'fileChange') {
          if (Array.isArray(approval.files) && approval.files.length) {
            appendApprovalDetail($('approval-body'), '文件', approval.files.join('\n'), true);
          }
          appendApprovalDetail($('approval-body'), '授权根目录', approval.grantRoot || '');
          appendApprovalDetail($('approval-body'), 'Item', approval.itemId || '');
          appendApprovalDetail($('approval-body'), '原因', approval.reason || '');
        } else {
          (approval.questions || []).forEach((question) => renderToolQuestion($('approval-body'), question));
        }

        const decisions = approval.availableDecisions || ['cancel'];
        decisions.forEach((decision) => {
          const button = document.createElement('button');
          button.type = 'button';
          button.className = decision === 'accept' || decision === 'submit' ? 'send-button text-send' : 'secondary-button';
          button.textContent = decisionLabel(decision);
          button.addEventListener('click', () => resolveApproval(decision));
          $('approval-actions').appendChild(button);
        });
        $('approval-overlay').hidden = false;
      }
      function showNextApproval() {
        if (state.activeApprovalId || !state.pendingApprovals.size) return;
        const approval = state.pendingApprovals.values().next().value;
        renderApprovalDialog(approval);
      }
      function hideApprovalDialog() {
        $('approval-overlay').hidden = true;
        state.activeApprovalId = null;
        showNextApproval();
      }
      async function resolveApproval(decision) {
        const approval = state.pendingApprovals.get(state.activeApprovalId);
        if (!approval) {
          hideApprovalDialog();
          return;
        }

        $('approval-actions').querySelectorAll('button').forEach((button) => {
          button.disabled = true;
        });

        try {
          await window.deepcode.resolveApproval({
            approvalId: approval.id,
            decision: decision === 'submit' ? undefined : decision,
            answers: approval.kind === 'toolInput' && decision === 'submit' ? collectToolAnswers() : {},
          });
          state.pendingApprovals.delete(approval.id);
          appendRunLog(`审批已响应：${decisionLabel(decision)}`);
          hideApprovalDialog();
        } catch (error) {
          appendRunLog(`审批响应失败：${error.message}`);
          $('approval-actions').querySelectorAll('button').forEach((button) => {
            button.disabled = false;
          });
        }
      }
      function setComposerRunning(isRunning) {
        $('send-button').textContent = isRunning ? '↵' : '↑';
        $('send-button').title = isRunning ? '追加输入' : '发送';
        $('send-button').disabled = false;
        $('interrupt-button').hidden = !isRunning;
        $('interrupt-button').disabled = false;
        $('prompt-input').disabled = false;
      }
      async function steerTurn() {
        const message = $('prompt-input').value.trim();
        if (!message || !state.sending) return;
        $('prompt-input').value = '';
        addMessage('user', `追加输入：${message}`);
        appendRunLog('发送追加输入');
        try {
          await window.deepcode.steerTurn({
            conversationId: state.conversationId,
            turnId: state.turnId,
            message,
          });
        } catch (error) {
          addMessage('error', error.message);
          appendRunLog(`追加输入失败：${error.message}`);
        }
      }
      async function interruptTurn() {
        if (!state.sending || state.interrupting) return;
        state.interrupting = true;
        $('interrupt-button').disabled = true;
        appendRunLog('请求取消运行');
        setStatus('Cancelling', 'running');
        try {
          await window.deepcode.interruptTurn({
            conversationId: state.conversationId,
            turnId: state.turnId,
          });
        } catch (error) {
          addMessage('error', error.message);
          appendRunLog(`取消失败：${error.message}`);
          $('interrupt-button').disabled = false;
        } finally {
          state.interrupting = false;
        }
      }
      async function sendMessage() {
        const message = $('prompt-input').value.trim();
        if (state.sending) {
          await steerTurn();
          return;
        }
        if (!message) return;
        const requestId = createRequestId();
        state.sending = true;
        state.activeRequestId = requestId;
        state.currentRequest = message;
        state.streamContent = '';
        state.activeAgentMessage = null;
        resetTurnSummary();
        setComposerRunning(true);
        $('prompt-input').value = '';
        resetRunLog();
        setStatus('Running', 'running');
        clearEmptyState();
        addMessage('user', message);
        state.turnStartedAt = Date.now();
        state.activeSummaryEvent = addEventLine('正在处理');
        appendRunLog('Turn started');
        appendRunLog(`Transport: ${state.settings.transport || 'mock'}`);
        state.activeAgentMessage = addMessage('agent', '正在连接 Codex app-server...');
        try {
          const response = await window.deepcode.sendMessage({
            requestId,
            message,
            conversationId: state.conversationId,
            model: state.settings.model,
            workspacePath: state.settings.workspacePath,
          });
          state.conversationId = response.conversationId || state.conversationId;
          state.turnId = response.turnId || null;
          state.latestPlan = response.plan || response.content || '(空回复)';
          if (state.activeAgentMessage) {
            state.activeAgentMessage.textContent = response.content || '(空回复)';
          }
          $('plan-box').textContent = state.latestPlan;
          $('plan-summary').textContent = '已更新';
          $('save-plan').disabled = false;
          appendRunLog(response.isMock ? 'Mock 完成' : `Turn 完成：${response.turnId || ''}`.trim());
          completeTurnSummary();
          setStatus(response.isMock ? 'Mock Ready' : 'Done');
          await loadThreads();
        } catch (error) {
          if (state.activeAgentMessage && !state.streamContent) {
            state.activeAgentMessage.remove();
          }
          addMessage('error', error.message);
          appendRunLog(`错误：${error.message}`);
          updateEventLine(state.activeSummaryEvent, `处理失败：${error.message}`);
          setStatus('Error', 'error');
        } finally {
          state.sending = false;
          state.activeRequestId = '';
          state.activeAgentMessage = null;
          state.pendingApprovals.clear();
          $('approval-overlay').hidden = true;
          state.activeApprovalId = null;
          setComposerRunning(false);
          $('prompt-input').focus();
        }
      }
      async function saveSettings() {
        $('settings-notice').textContent = '保存中...';
        state.settings = await window.deepcode.saveSettings(collectSettingsForm());
        fillSettingsForm();
        updateMeta();
        await loadThreads();
        $('settings-notice').textContent = '设置已保存。';
      }
      async function testConnection() {
        $('settings-notice').textContent = '测试连接中...';
        const result = await window.deepcode.testConnection(collectSettingsForm());
        $('settings-notice').textContent = result.message;
        setStatus(result.ok ? 'Connected' : 'Error', result.ok ? 'ready' : 'error');
      }
      async function savePlan() {
        if (!state.latestPlan) return;
        $('plan-notice').textContent = '保存中...';
        const result = await window.deepcode.savePlan({
          request: state.currentRequest,
          plan: state.latestPlan,
          model: state.settings.model,
          workspacePath: state.settings.workspacePath,
          transport: state.settings.transport,
          conversationId: state.conversationId,
          turnId: state.turnId,
        });
        $('plan-notice').textContent = `已保存：${result.filePath}`;
      }
      async function resumeThread(threadId) {
        if (!threadId || state.sending) return;
        switchView('chat');
        resetTurnSummary();
        $('messages').innerHTML = '';
        state.emptyStateMessage = null;
        state.streamContent = '';
        state.activeAgentMessage = null;
        resetRunLog();
        setStatus('Loading', 'running');
        try {
          const result = await window.deepcode.resumeThread({ threadId });
          state.conversationId = result.conversationId || threadId;
          state.turnId = null;
          state.currentRequest = '';
          state.latestPlan = '';
          $('plan-box').textContent = '已恢复历史对话。继续发送消息会沿用该 thread。';
          $('plan-summary').textContent = '已恢复';
          $('save-plan').disabled = true;
          addEventLine(`已恢复对话 ${String(state.conversationId).slice(0, 8)}`);
          appendRunLog(`Thread resumed: ${state.conversationId}`);
          setStatus('Ready');
          renderThreadList();
        } catch (error) {
          addMessage('error', error.message);
          appendRunLog(`恢复失败：${error.message}`);
          setStatus('Error', 'error');
        }
      }
      async function resetChat() {
        if (state.sending) return;
        state.conversationId = null;
        state.turnId = null;
        state.currentRequest = '';
        state.latestPlan = '';
        state.streamContent = '';
        resetTurnSummary();
        $('messages').innerHTML = '';
        state.emptyStateMessage = null;
        $('plan-box').textContent = '暂无计划。发送需求后，Agent 回复会显示在这里。';
        $('plan-summary').textContent = '暂无计划';
        $('plan-notice').textContent = '';
        $('save-plan').disabled = true;
        resetRunLog();
        setStatus('Ready');
        switchView('chat');
        showEmptyState();
        if ((state.settings.transport || 'mock') !== 'mock') {
          try {
            const result = await window.deepcode.newThread({});
            state.conversationId = result.conversationId || null;
            await loadThreads();
            switchView('chat');
          } catch (error) {
            addMessage('error', error.message);
            setStatus('Error', 'error');
          }
        } else {
          await loadThreads();
        }
      }
      function handleAgentEvent(event) {
        if (!event || event.requestId !== state.activeRequestId) {
          return;
        }

        if (event.conversationId) {
          state.conversationId = event.conversationId;
          renderThreadList();
        }
        if (event.turnId) {
          state.turnId = event.turnId;
        }

        if (event.type === 'approvalRequired') {
          const approval = event.approval;
          if (approval?.id) {
            state.pendingApprovals.set(approval.id, approval);
            showNextApproval();
          }
          addEventLine(event.label || `需要审批：${event.rawMethod || 'unknown'}`, 'approval');
          appendRunLog(event.label || `Approval request: ${event.rawMethod || 'unknown'}`);
          return;
        }

        if (event.type === 'approvalResolved') {
          if (event.approvalId) {
            state.pendingApprovals.delete(event.approvalId);
            if (state.activeApprovalId === event.approvalId) {
              hideApprovalDialog();
            }
          }
          appendRunLog(event.label || '审批已响应');
          return;
        }

        if (event.type === 'serverRequest') {
          addEventLine(event.label || `需要客户端处理：${event.rawMethod || 'unknown'}`, 'approval');
          appendRunLog(event.label || `Server request: ${event.rawMethod || 'unknown'}`);
          return;
        }

        if (event.type === 'delta') {
          state.streamContent = event.content || `${state.streamContent}${event.delta || ''}`;
          if (state.activeAgentMessage) {
            state.activeAgentMessage.textContent = state.streamContent || '正在生成回复...';
          }
          return;
        }

        if (event.type === 'plan' || event.type === 'planDelta') {
          $('plan-box').textContent = event.content || '';
          state.latestPlan = event.content || state.latestPlan;
          $('plan-summary').textContent = state.latestPlan ? '已更新' : '暂无计划';
          $('save-plan').disabled = !state.latestPlan;
          return;
        }

        if (event.label) {
          appendRunLog(event.label);
          if (event.type === 'done') {
            completeTurnSummary();
          }
        }
      }
      function bindEvents() {
        $('new-chat').addEventListener('click', () => resetChat());
        $('refresh-threads').addEventListener('click', () => loadThreads());
        $('open-settings').addEventListener('click', () => switchView('settings'));
        $('transport').addEventListener('change', updateTransportFields);
        $('send-button').addEventListener('click', sendMessage);
        $('interrupt-button').addEventListener('click', interruptTurn);
        $('save-settings').addEventListener('click', saveSettings);
        $('test-connection').addEventListener('click', testConnection);
        $('save-plan').addEventListener('click', savePlan);
        $('approval-close').addEventListener('click', () => resolveApproval('cancel'));
        $('approval-overlay').addEventListener('click', (event) => {
          if (event.target === $('approval-overlay')) {
            resolveApproval('cancel');
          }
        });
        $('window-minimize').addEventListener('click', () => window.deepcode.minimizeWindow());
        $('window-maximize').addEventListener('click', () => window.deepcode.toggleMaximizeWindow());
        $('window-close').addEventListener('click', () => window.deepcode.closeWindow());
        $('prompt-input').addEventListener('keydown', (event) => {
          if (event.key === 'Enter' && !event.shiftKey) {
            event.preventDefault();
            sendMessage();
          }
        });
      }
      async function init() {
        $('version-info').textContent = `Chrome ${window.deepcode.versions.chrome} · Electron ${window.deepcode.versions.electron}`;
        bindEvents();
        window.deepcode.onAgentEvent(handleAgentEvent);
        await loadSettings();
        showEmptyState();
      }
      init().catch((error) => {
        addMessage('error', error.message);
        setStatus('Error', 'error');
      });
    </script>
  </body>
</html>
