<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DeepCode</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body data-view="chat">
    <div class="app-shell">
      <header class="app-bar">
        <div class="app-bar-left">
          <button class="icon-button" type="button" title="后退" disabled>‹</button>
          <button class="icon-button" type="button" title="前进" disabled>›</button>
          <nav class="menu-strip" aria-label="应用菜单">
            <button type="button">文件</button>
            <button type="button">编辑</button>
            <button type="button">查看</button>
            <button type="button">窗口</button>
            <button type="button">帮助</button>
          </nav>
        </div>
        <div class="app-bar-right">
          <button class="toolbar-button" type="button" title="运行">▷</button>
          <button class="toolbar-button model-toolbar" type="button" title="模型"><span id="toolbar-model">模型</span>⌄</button>
          <button class="icon-button" type="button" title="终端">⌁</button>
          <button class="icon-button" type="button" title="面板">▯</button>
          <div class="status-pill" id="status-pill" data-mode="ready"><span class="status-dot"></span><span id="status-text">Ready</span></div>
          <div class="window-controls" aria-label="窗口控制">
            <button id="window-minimize" class="window-control" type="button" title="最小化">─</button>
            <button id="window-maximize" class="window-control" type="button" title="最大化">□</button>
            <button id="window-close" class="window-control close" type="button" title="关闭">×</button>
          </div>
        </div>
      </header>

      <div class="workbench">
        <aside class="sidebar">
          <div class="sidebar-content">
            <div class="brand"><span class="brand-mark">D</span><span>DeepCode</span></div>
            <nav class="primary-nav" aria-label="主导航">
              <button id="new-chat" class="nav-button" type="button"><span class="nav-icon">＋</span><span>新对话</span></button>
              <button class="nav-button" type="button"><span class="nav-icon">⌕</span><span>搜索</span></button>
              <button class="nav-button" type="button"><span class="nav-icon">⌘</span><span>插件</span></button>
              <button class="nav-button" type="button"><span class="nav-icon">◴</span><span>自动化</span></button>
            </nav>

            <div class="nav-section">
              <div class="section-label">项目</div>
              <button class="project-item active" type="button">
                <span class="project-icon">▱</span>
                <span class="item-main">deepcode</span>
                <span class="item-action">↗</span>
              </button>
              <button class="project-item" type="button">
                <span class="project-icon">▱</span>
                <span class="item-main">onedrive-vercel-index</span>
                <span class="item-action">↗</span>
              </button>
              <button class="project-item" type="button">
                <span class="project-icon">▱</span>
                <span class="item-main">MoverTool</span>
                <span class="item-action">↗</span>
              </button>
              <button class="project-item" type="button">
                <span class="project-icon">▱</span>
                <span class="item-main">pusheen</span>
                <span class="item-action">↗</span>
              </button>
            </div>

            <div class="nav-section conversations">
              <div class="section-label row-label"><span>对话</span><span>≡</span></div>
              <button class="session-item active" type="button" data-view="chat">
                <span>修复对话报错</span>
                <span class="item-time">10 分</span>
              </button>
              <button class="session-item" type="button" data-view="chat">
                <span>优化项目文档</span>
                <span class="item-time">1 小时</span>
              </button>
              <button class="session-item empty" type="button" data-view="chat">
                <span>暂无聊天</span>
              </button>
            </div>
          </div>

          <div class="sidebar-footer">
            <button id="open-settings" class="settings-link" type="button" data-view="settings"><span class="nav-icon">⚙</span><span>设置</span></button>
            <div class="version-info" id="version-info"></div>
          </div>
        </aside>

        <main class="main-pane">
          <header class="conversation-header">
            <div>
              <h1 id="view-title">修复对话报错</h1>
              <div class="meta-line"><span id="workspace-meta">工作区加载中</span> · <span id="model-meta">模型加载中</span></div>
            </div>
            <button class="conversation-more" type="button" title="更多">···</button>
          </header>

          <section id="chat-view" class="view active">
            <div id="messages" class="messages"></div>
            <div class="composer">
              <div class="composer-card">
                <textarea id="prompt-input" placeholder="输入需求，描述你想让 DeepCode 处理的事情"></textarea>
                <div class="composer-actions">
                  <div class="composer-tools">
                    <button class="icon-button composer-tool" type="button" title="添加">＋</button>
                    <button class="tool-chip" type="button" title="自动审查">自动审查⌄</button>
                    <button class="tool-chip" type="button" title="模型"><span id="composer-model">模型</span>⌄</button>
                  </div>
                  <div class="composer-tools">
                    <button class="icon-button composer-tool" type="button" title="语音">◌</button>
                    <button id="send-button" class="send-button" type="button" title="发送">↑</button>
                  </div>
                </div>
              </div>
            </div>
          </section>

          <section id="settings-view" class="view">
            <div class="settings-card">
              <h2>基础设置</h2>
              <p class="helper-text">V1 默认使用 mock 联调；切到 stdio 后会由主进程启动 `codex app-server` 并通过 JSON-RPC 通信。</p>
              <div class="form-grid">
                <label>Transport
                  <select id="transport">
                    <option value="mock">mock</option>
                    <option value="stdio">stdio</option>
                    <option value="websocket">websocket</option>
                  </select>
                </label>
                <label>Codex 命令
                  <input id="app-server-command" type="text" placeholder="codex" />
                </label>
                <label>Codex 参数
                  <input id="app-server-args" type="text" placeholder="app-server" />
                </label>
                <label>WebSocket URL
                  <input id="app-server-url" type="text" placeholder="ws://127.0.0.1:4500" />
                </label>
                <label>模型名称
                  <input id="model" type="text" placeholder="gpt-5.4" />
                </label>
                <label>工作区路径
                  <input id="workspace-path" type="text" />
                </label>
                <label>OpenAI API Key
                  <input id="api-key" type="password" placeholder="可选：为空时使用本机 Codex 登录或环境变量" />
                </label>
              </div>
              <div class="form-actions">
                <button id="save-settings" class="send-button text-send" type="button">保存设置</button>
                <button id="test-connection" class="secondary-button" type="button">连接测试</button>
              </div>
              <div id="settings-notice" class="notice"></div>
            </div>
          </section>
        </main>

        <aside class="branch-panel" aria-label="分支详情">
          <div class="branch-card">
            <div class="branch-heading">
              <h2>分支详情</h2>
              <button class="icon-button" type="button" title="更多">···</button>
            </div>
            <div class="branch-row changes-row">
              <span class="branch-label">更改</span>
              <span class="change-counts"><span class="insertions">+3,007</span> <span class="deletions">-46</span></span>
            </div>
            <div class="branch-row">
              <span class="branch-label">Git 操作</span>
              <span class="branch-value">本地更改</span>
            </div>
            <div class="branch-row muted-row">
              <span class="branch-label">GitHub CLI</span>
              <span class="branch-value">不可用</span>
            </div>
            <div class="branch-actions">
              <button id="save-plan" class="secondary-button" type="button" disabled>保存计划</button>
              <button class="secondary-button ghost" type="button" disabled>发布 PR</button>
            </div>
            <details class="branch-subsection branch-details">
              <summary><span>运行事件</span><span id="run-summary">等待运行</span></summary>
              <div id="run-log" class="run-log">等待运行。</div>
            </details>
            <details class="branch-subsection branch-details">
              <summary><span>最近计划</span><span id="plan-summary">暂无计划</span></summary>
              <div id="plan-box" class="plan-box">暂无计划。发送需求后，Agent 回复会显示在这里。</div>
              <div id="plan-notice" class="notice"></div>
            </details>
          </div>
        </aside>
      </div>
    </div>

    <script>
      const state = {
        settings: {},
        conversationId: null,
        turnId: null,
        currentRequest: '',
        latestPlan: '',
        sending: false,
        activeRequestId: '',
        streamContent: '',
        activeAgentMessage: null,
        activeSummaryEvent: null,
        turnStartedAt: 0,
        summaryCompleted: false,
        eventStats: {
          commands: 0,
        },
        emptyStateMessage: null,
        runLogCount: 0,
      };
      const $ = (id) => document.getElementById(id);
      function createRequestId() {
        return `request-${Date.now()}-${Math.random().toString(16).slice(2)}`;
      }
      function setStatus(text, mode = 'ready') {
        $('status-text').textContent = text;
        $('status-pill').dataset.mode = mode;
      }
      function scrollMessages() {
        $('messages').scrollTop = $('messages').scrollHeight;
      }
      function addMessage(role, content) {
        const message = document.createElement('div');
        message.className = `message ${role}`;
        message.textContent = content;
        $('messages').appendChild(message);
        scrollMessages();
        return message;
      }
      function showEmptyState() {
        if (state.emptyStateMessage) return;
        const message = document.createElement('div');
        message.className = 'empty-state-message';
        message.textContent = '你好，我是 DeepCode Code Agent。请描述你想实现的功能或修改。';
        $('messages').appendChild(message);
        state.emptyStateMessage = message;
      }
      function clearEmptyState() {
        if (!state.emptyStateMessage) return;
        state.emptyStateMessage.remove();
        state.emptyStateMessage = null;
      }
      function addEventLine(label, mode = 'event') {
        const entry = document.createElement('div');
        entry.className = `timeline-event ${mode}`;
        entry.textContent = label;
        $('messages').appendChild(entry);
        scrollMessages();
        return entry;
      }
      function updateEventLine(entry, label) {
        if (!entry) return;
        entry.textContent = label;
      }
      function formatElapsed(startedAt) {
        const elapsed = Math.max(0, Date.now() - startedAt);
        if (elapsed < 1000) {
          return '1s';
        }
        const seconds = Math.round(elapsed / 1000);
        if (seconds < 60) {
          return `${seconds}s`;
        }
        const minutes = Math.floor(seconds / 60);
        const rest = seconds % 60;
        return rest ? `${minutes}m ${rest}s` : `${minutes}m`;
      }
      function resetTurnSummary() {
        state.activeSummaryEvent = null;
        state.turnStartedAt = 0;
        state.summaryCompleted = false;
        state.eventStats = {
          commands: 0,
        };
      }
      function updateEventStats(label) {
        if (/commandExecution started/i.test(label)) {
          state.eventStats.commands += 1;
        }
      }
      function completeTurnSummary() {
        if (state.summaryCompleted || !state.activeSummaryEvent || !state.turnStartedAt) {
          return;
        }
        state.summaryCompleted = true;
        updateEventLine(state.activeSummaryEvent, `已处理 ${formatElapsed(state.turnStartedAt)}`);
        if (state.eventStats.commands > 0) {
          addEventLine(`已运行 ${state.eventStats.commands} 条命令`);
        }
      }
      function appendRunLog(label) {
        const runLog = $('run-log');
        if (runLog.textContent === '等待运行。') {
          runLog.textContent = '';
        }
        const entry = document.createElement('div');
        entry.textContent = label;
        runLog.appendChild(entry);
        runLog.scrollTop = runLog.scrollHeight;
        state.runLogCount += 1;
        $('run-summary').textContent = `${state.runLogCount} 条事件`;
        updateEventStats(label);
      }
      function resetRunLog() {
        state.runLogCount = 0;
        $('run-log').textContent = '等待运行。';
        $('run-summary').textContent = '等待运行';
      }
      function updateMeta() {
        const transport = state.settings.transport || 'mock';
        const model = state.settings.model || '未设置模型';
        $('workspace-meta').textContent = state.settings.workspacePath || '未设置工作区';
        $('model-meta').textContent = `${transport} · ${model}`;
        $('toolbar-model').textContent = model;
        $('composer-model').textContent = model;
      }
      function updateTransportFields() {
        const transport = $('transport').value;
        const isWebSocket = transport === 'websocket';
        const isMock = transport === 'mock';
        $('app-server-url').disabled = !isWebSocket;
        $('app-server-command').disabled = isMock || isWebSocket;
        $('app-server-args').disabled = isMock || isWebSocket;
      }
      function fillSettingsForm() {
        $('transport').value = state.settings.transport || 'mock';
        $('app-server-command').value = state.settings.appServerCommand || 'codex';
        $('app-server-args').value = state.settings.appServerArgs || 'app-server';
        $('api-key').value = state.settings.apiKey || '';
        $('app-server-url').value = state.settings.appServerUrl || '';
        $('model').value = state.settings.model || '';
        $('workspace-path').value = state.settings.workspacePath || '';
        updateTransportFields();
      }
      function collectSettingsForm() {
        return {
          transport: $('transport').value,
          appServerCommand: $('app-server-command').value.trim(),
          appServerArgs: $('app-server-args').value.trim(),
          apiKey: $('api-key').value.trim(),
          appServerUrl: $('app-server-url').value.trim(),
          model: $('model').value.trim(),
          workspacePath: $('workspace-path').value.trim(),
        };
      }
      function switchView(view) {
        document.body.dataset.view = view;
        $('chat-view').classList.toggle('active', view === 'chat');
        $('settings-view').classList.toggle('active', view === 'settings');
        document.querySelectorAll('.session-item').forEach((item, index) => {
          item.classList.toggle('active', view === 'chat' && index === 0);
        });
        $('open-settings').classList.toggle('active', view === 'settings');
        $('view-title').textContent = view === 'settings' ? '设置' : '修复对话报错';
      }
      async function loadSettings() {
        state.settings = await window.deepcode.getSettings();
        fillSettingsForm();
        updateMeta();
      }
      async function sendMessage() {
        const message = $('prompt-input').value.trim();
        if (!message || state.sending) return;
        const requestId = createRequestId();
        state.sending = true;
        state.activeRequestId = requestId;
        state.currentRequest = message;
        state.streamContent = '';
        state.activeAgentMessage = null;
        resetTurnSummary();
        $('send-button').disabled = true;
        $('prompt-input').disabled = true;
        $('prompt-input').value = '';
        resetRunLog();
        setStatus('Running', 'running');
        clearEmptyState();
        addMessage('user', message);
        state.turnStartedAt = Date.now();
        state.activeSummaryEvent = addEventLine('正在处理');
        appendRunLog('Turn started');
        appendRunLog(`Transport: ${state.settings.transport || 'mock'}`);
        state.activeAgentMessage = addMessage('agent', '正在连接 Codex app-server...');
        try {
          const response = await window.deepcode.sendMessage({
            requestId,
            message,
            conversationId: state.conversationId,
            model: state.settings.model,
            workspacePath: state.settings.workspacePath,
          });
          state.conversationId = response.conversationId || state.conversationId;
          state.turnId = response.turnId || null;
          state.latestPlan = response.plan || response.content || '(空回复)';
          if (state.activeAgentMessage) {
            state.activeAgentMessage.textContent = response.content || '(空回复)';
          }
          $('plan-box').textContent = state.latestPlan;
          $('plan-summary').textContent = '已更新';
          $('save-plan').disabled = false;
          appendRunLog(response.isMock ? 'Mock 完成' : `Turn 完成：${response.turnId || ''}`.trim());
          completeTurnSummary();
          setStatus(response.isMock ? 'Mock Ready' : 'Done');
        } catch (error) {
          if (state.activeAgentMessage && !state.streamContent) {
            state.activeAgentMessage.remove();
          }
          addMessage('error', error.message);
          appendRunLog(`错误：${error.message}`);
          updateEventLine(state.activeSummaryEvent, `处理失败：${error.message}`);
          setStatus('Error', 'error');
        } finally {
          state.sending = false;
          state.activeRequestId = '';
          state.activeAgentMessage = null;
          $('send-button').disabled = false;
          $('prompt-input').disabled = false;
          $('prompt-input').focus();
        }
      }
      async function saveSettings() {
        $('settings-notice').textContent = '保存中...';
        state.settings = await window.deepcode.saveSettings(collectSettingsForm());
        fillSettingsForm();
        updateMeta();
        $('settings-notice').textContent = '设置已保存。';
      }
      async function testConnection() {
        $('settings-notice').textContent = '测试连接中...';
        const result = await window.deepcode.testConnection(collectSettingsForm());
        $('settings-notice').textContent = result.message;
        setStatus(result.ok ? 'Connected' : 'Error', result.ok ? 'ready' : 'error');
      }
      async function savePlan() {
        if (!state.latestPlan) return;
        $('plan-notice').textContent = '保存中...';
        const result = await window.deepcode.savePlan({
          request: state.currentRequest,
          plan: state.latestPlan,
          model: state.settings.model,
          workspacePath: state.settings.workspacePath,
          transport: state.settings.transport,
          conversationId: state.conversationId,
          turnId: state.turnId,
        });
        $('plan-notice').textContent = `已保存：${result.filePath}`;
      }
      function resetChat() {
        state.conversationId = null;
        state.turnId = null;
        state.currentRequest = '';
        state.latestPlan = '';
        state.streamContent = '';
        resetTurnSummary();
        $('messages').innerHTML = '';
        state.emptyStateMessage = null;
        $('plan-box').textContent = '暂无计划。发送需求后，Agent 回复会显示在这里。';
        $('plan-summary').textContent = '暂无计划';
        $('plan-notice').textContent = '';
        $('save-plan').disabled = true;
        resetRunLog();
        setStatus('Ready');
        switchView('chat');
        showEmptyState();
      }
      function handleAgentEvent(event) {
        if (!event || event.requestId !== state.activeRequestId) {
          return;
        }

        if (event.type === 'delta') {
          state.streamContent = event.content || `${state.streamContent}${event.delta || ''}`;
          if (state.activeAgentMessage) {
            state.activeAgentMessage.textContent = state.streamContent || '正在生成回复...';
          }
          return;
        }

        if (event.type === 'plan' || event.type === 'planDelta') {
          $('plan-box').textContent = event.content || '';
          state.latestPlan = event.content || state.latestPlan;
          $('plan-summary').textContent = state.latestPlan ? '已更新' : '暂无计划';
          $('save-plan').disabled = !state.latestPlan;
          return;
        }

        if (event.label) {
          appendRunLog(event.label);
          if (event.type === 'done') {
            completeTurnSummary();
          }
        }
      }
      function bindEvents() {
        $('new-chat').addEventListener('click', resetChat);
        document.querySelectorAll('.session-item').forEach((item) => {
          item.addEventListener('click', () => switchView('chat'));
        });
        $('open-settings').addEventListener('click', () => switchView('settings'));
        $('transport').addEventListener('change', updateTransportFields);
        $('send-button').addEventListener('click', sendMessage);
        $('save-settings').addEventListener('click', saveSettings);
        $('test-connection').addEventListener('click', testConnection);
        $('save-plan').addEventListener('click', savePlan);
        $('window-minimize').addEventListener('click', () => window.deepcode.minimizeWindow());
        $('window-maximize').addEventListener('click', () => window.deepcode.toggleMaximizeWindow());
        $('window-close').addEventListener('click', () => window.deepcode.closeWindow());
        $('prompt-input').addEventListener('keydown', (event) => {
          if (event.key === 'Enter' && !event.shiftKey) {
            event.preventDefault();
            sendMessage();
          }
        });
      }
      async function init() {
        $('version-info').textContent = `Chrome ${window.deepcode.versions.chrome} · Electron ${window.deepcode.versions.electron}`;
        bindEvents();
        window.deepcode.onAgentEvent(handleAgentEvent);
        await loadSettings();
        showEmptyState();
      }
      init().catch((error) => {
        addMessage('error', error.message);
        setStatus('Error', 'error');
      });
    </script>
  </body>
</html>
